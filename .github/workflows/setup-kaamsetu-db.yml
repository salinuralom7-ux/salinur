name: Setup KaamSetu database
# One-time: creates the KaamSetu tables/functions in the existing Supabase
# project. Reads the Supabase access token from the repo secret
# SUPABASE_TOKEN (Settings → Secrets and variables → Actions).
# Removed after use.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: [".github/workflows/setup-kaamsetu-db.yml"]

permissions:
  contents: read

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run KaamSetu SQL on Supabase
        env:
          SB_TOKEN: ${{ secrets.SUPABASE_TOKEN }}
        run: |
          set -euo pipefail
          [ -n "$SB_TOKEN" ] || { echo "SUPABASE_TOKEN secret is not set"; exit 1; }
          echo "::add-mask::$SB_TOKEN"
          api=https://api.supabase.com/v1
          hdr=(-H "Authorization: Bearer $SB_TOKEN" -H "Content-Type: application/json")

          ref=$(curl -fsS "${hdr[@]}" $api/projects | jq -r '[.[] | select(.name=="budget-cars")][0].id // empty')
          [ -n "$ref" ] || { echo "Project budget-cars not found"; exit 1; }
          echo "Project: $ref"

          jq -Rs '{query:.}' docs/supabase-workers-setup.sql > /tmp/q.json
          curl -fsS "${hdr[@]}" -X POST $api/projects/$ref/database/query -d @/tmp/q.json > /dev/null
          echo "SQL executed"

          count=$(curl -fsS "${hdr[@]}" -X POST $api/projects/$ref/database/query \
            -d '{"query":"select count(*)::int as n from public.workers"}' | jq -r '.[0].n')
          echo "Workers table ready — rows: $count"
